<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FP荒木くん</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Input Section -->
        <div class="card input-section">
            <div>
                <div style="display: flex; justify-content: space-between; align-items: start;">
                    <h1>FP荒木くん</h1>
                    <a href="settings.html"
                        style="color: var(--text-muted); padding: 0.5rem; border-radius: 50%; background: rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; transition: all 0.2s;"
                        title="設定">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                    </a>
                </div>
                <p class="subtitle">年収と現在の借入状況から、主要な銀行タイプごとの借入可能額を瞬時に計算します。</p>
                <div id="print-summary" class="print-summary">
                    <!-- JavaScript will fill this -->
                </div>
                <p
                    style="font-size: 0.8rem; color: var(--primary); margin-top: 0.5rem; opacity: 0.9; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;">
                    <span>※はじめての方は最新の金利ファイルをダウンロードして、設定画面で取り込んでください</span>
                    <a href="settings.html"
                        style="color: #ef4444; font-weight: 700; text-decoration: none; border-bottom: 1px solid #ef4444;">初期設定はこちらをクリック</a>
                </p>
            </div>

            <form id="calc-form">
                <div class="form-group">
                    <label for="income">昨年の税込年収</label>
                    <div class="input-wrapper">
                        <input type="number" id="income" placeholder="例: 500" min="0" required>
                        <span class="unit">万円</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="debt">現在の借入の年間返済額</label>
                    <div class="input-wrapper">
                        <input type="number" id="debt" placeholder="例: 0" min="0" value="0">
                        <span class="unit">万円/年</span>
                    </div>
                    <!-- Note for user -->
                    <div style="font-size: 0.8rem; color: #64748b; margin-top: 0.2rem;">
                        ※車のローン、カードローン等の年間支払い総額
                    </div>
                </div>

                <div class="form-group">
                    <label for="years">希望ローン年数</label>
                    <div class="input-wrapper">
                        <input type="number" id="years" value="35" min="1" max="50" required>
                        <span class="unit">年</span>
                    </div>
                </div>

                <button type="submit" class="calculate-btn">計算する</button>
            </form>
        </div>

        <!-- Results Section -->
        <div class="results-section">
            <div id="results-actions" class="results-actions" style="display: none;">
                <button id="print-btn" class="action-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 6 2 18 2 18 9"></polyline>
                        <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                        <rect x="6" y="14" width="12" height="8"></rect>
                    </svg>
                    印刷する
                </button>
                <button id="pdf-btn" class="action-btn pdf">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    PDF出力
                </button>
            </div>
            <div id="results-container">
                <div class="empty-state" id="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                    <p>左側のフォームに必要な情報を入力して<br>「計算する」ボタンを押してください</p>
                </div>
            </div>
        </div>

        <button id="back-to-top" class="back-to-top" title="上にもどる">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
        </button>
        <script src="script.js"></script>
</body>

</html>
