<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定 | FP荒木くん</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        .settings-container {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .back-link {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .bank-setting-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            align-items: end;
            position: relative;
            transition: transform 0.2s;
        }

        @media (max-width: 600px) {
            .bank-setting-card {
                grid-template-columns: 1fr;
            }
        }

        .delete-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(220, 38, 38, 0.1);
            color: #ef4444;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: rgba(220, 38, 38, 0.2);
            transform: scale(1.05);
        }

        .add-bank-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--glass-border);
        }

        .add-card {
            border: 2px dashed var(--glass-border);
            background: rgba(30, 41, 59, 0.3);
        }

        .row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .row>.form-group {
            flex: 1;
            min-width: 140px;
        }

        @media (max-width: 600px) {
            .row {
                flex-direction: column;
            }
        }

        .save-banner {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--success);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 100;
        }

        .save-banner.show {
            transform: translateY(0);
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }
    </style>
</head>

<body>
    <div class="container settings-container">
        <div class="header-actions">
            <a href="index.html" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7" />
                </svg>
                シミュレーターに戻る
            </a>
            <h1>審査基準設定</h1>
        </div>

        <!-- DOWNLOAD SECTION -->
        <div class="card"
            style="margin-bottom: 2rem; border: 1px solid var(--primary); background: rgba(99, 102, 241, 0.1);">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div
                    style="background: var(--primary); padding: 0.75rem; border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </div>
                <div>
                    <p style="margin-bottom: 0.25rem; font-weight: 600; color: var(--text-main);">最新の金利ファイル</p>
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">
                        最新の金利ファイルをクリックするだけで、すべての審査基準が自動的に適用されます。</p>
                    <a href="#" id="apply-latest-rates"
                        style="color: var(--primary); text-decoration: none; font-size: 0.9rem; font-weight: 700; display: inline-flex; align-items: center; gap: 0.25rem;">
                        最新の金利を自動適用する
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </a>
                    <p
                        style="font-size: 0.75rem; color: #10b981; margin-top: 0.5rem; line-height: 1.4; font-weight: 500;">
                        ※クリック後、すぐに設定が反映され一覧が更新されます。
                    </p>
                    <!-- 管理者用機能 -->
                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--glass-border);">
                        <button id="admin-generate-json" class="reset-btn"
                            style="font-size: 0.7rem; opacity: 0.6; padding: 0.25rem 0.5rem;">
                            管理者用：最新金利JSONを生成
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 2rem;">
            <div
                style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <p class="subtitle" style="margin-bottom: 0;">各金融機関の審査基準をカスタマイズできます。</p>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                    <button id="toggle-add-form" class="reset-btn"
                        style="background: var(--primary); color: white; border-color: var(--primary);">新規追加</button>
                    <button id="export-settings" class="reset-btn"
                        style="border-color: var(--primary); color: var(--primary);">設定を書き出し</button>
                    <button id="import-trigger" class="reset-btn">設定を取り込み</button>
                    <input type="file" id="import-file" style="display: none;" accept=".json">
                    <button id="reset-defaults" class="reset-btn">初期値に戻す</button>
                </div>
            </div>
        </div>

        <!-- 新規追加フォーム (初期状態は非表示) -->
        <div id="add-bank-section" class="add-bank-section"
            style="display: none; margin-bottom: 2rem; border-top: none; padding-top: 0;">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.2rem;">新規銀行を追加</h2>
            <div class="card add-card">
                <form id="add-bank-form">
                    <div class="form-group" style="margin-bottom: 1rem;">
                        <label>銀行名</label>
                        <div class="input-wrapper">
                            <input type="text" id="new-name" placeholder="例: ○○銀行" required>
                        </div>
                    </div>

                    <div class="row" style="margin-bottom: 1rem;">
                        <div class="form-group">
                            <label>タイプ</label>
                            <div class="input-wrapper">
                                <select id="new-type"
                                    style="width: 100%; background: transparent; border: none; color: var(--text-main); font-size: 1.1rem; font-weight: 500; outline: none;">
                                    <option value="都市銀行" style="background: #1e293b;">都市銀行</option>
                                    <option value="地方銀行" style="background: #1e293b;">地方銀行</option>
                                    <option value="信託銀行" style="background: #1e293b;">信託銀行</option>
                                    <option value="協同組合" style="background: #1e293b;">協同組合</option>
                                    <option value="労働金庫" style="background: #1e293b;">労働金庫</option>
                                    <option value="ネット銀行" style="background: #1e293b;">ネット銀行</option>
                                    <option value="信用金庫・組合" style="background: #1e293b;">信用金庫・組合</option>
                                    <option value="その他" style="background: #1e293b;">その他</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>カラー</label>
                            <div class="input-wrapper">
                                <input type="color" id="new-color" value="#6366f1"
                                    style="height: 50px; padding: 0.5rem;">
                            </div>
                        </div>
                    </div>

                    <div class="row" style="margin-bottom: 1rem;">
                        <div class="form-group">
                            <label>審査金利 (%)</label>
                            <div class="input-wrapper">
                                <input type="number" id="new-stress" step="0.001" value="3.5" required>
                            </div>
                        </div>
                    </div>

                    <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 12px; margin-bottom: 1rem;">
                        <label style="display:block; margin-bottom:0.5rem; color: var(--text-muted);">返済比率設定</label>
                        <div class="row">
                            <div class="form-group">
                                <label>基準年収 (万円)</label>
                                <div class="input-wrapper">
                                    <input type="number" id="new-threshold" value="400" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>未満 (%)</label>
                                <div class="input-wrapper">
                                    <input type="number" id="new-ratio-below" step="1" value="30" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>以上 (%)</label>
                                <div class="input-wrapper">
                                    <input type="number" id="new-ratio-above" step="1" value="35" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem;">
                        <button type="submit" class="btn-primary" style="flex: 2; margin-top: 0;">追加する</button>
                        <button type="button" id="cancel-add" class="reset-btn" style="flex: 1;">キャンセル</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="settings-list">
            <!-- script.jsによって生成されます -->
        </div>
    </div>

    <!-- 保存完了バナー -->
    <div id="save-banner" class="save-banner">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
        </svg>
        設定を保存しました
    </div>

    <button id="back-to-top" class="back-to-top" title="上にもどる">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>
    <script src="script.js"></script>
</body>

</html>
